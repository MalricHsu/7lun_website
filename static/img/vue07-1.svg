<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f855a"/>
    </marker>
  </defs>

  <!-- title -->
  <text x="40" y="34" font-size="20" font-weight="700" fill="#1e293b">Pinia Store 架構與資料流</text>
  <text x="40" y="55" font-size="13" fill="#64748b">元件呼叫 Action ─► 改 State ─► Getter 自動衍生 ─► 畫面響應式更新</text>

  <!-- Store container -->
  <rect x="392" y="78" width="452" height="372" rx="16" fill="#f7faf9" stroke="#cfe3d8" stroke-width="1.5"/>
  <rect x="410" y="66" width="86" height="28" rx="14" fill="#42b883"/>
  <text x="453" y="85" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Store</text>

  <!-- Actions box -->
  <rect x="422" y="106" width="392" height="90" rx="12" fill="#e9f7ef" stroke="#42b883" stroke-width="1.5"/>
  <text x="446" y="138" font-size="18" font-weight="700" fill="#2f855a">Actions</text>
  <text x="446" y="160" font-size="13" fill="#3f7a5c">function ｜ 動詞</text>
  <text x="446" y="180" font-size="12.5" fill="#557a68">修改 state、封裝商業邏輯（可同步 / 非同步）</text>

  <!-- State box -->
  <rect x="422" y="220" width="392" height="90" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="446" y="252" font-size="18" font-weight="700" fill="#4338ca">State</text>
  <text x="446" y="274" font-size="13" fill="#5b54c9">ref() / reactive() ｜ 名詞</text>
  <text x="446" y="294" font-size="12.5" fill="#6b6ba8">資料本身，具響應性（single source of truth）</text>

  <!-- Getters box -->
  <rect x="422" y="334" width="392" height="90" rx="12" fill="#fdf6e3" stroke="#eab308" stroke-width="1.5"/>
  <text x="446" y="366" font-size="18" font-weight="700" fill="#a16207">Getters</text>
  <text x="446" y="388" font-size="13" fill="#b07d10">computed() ｜ 形容詞</text>
  <text x="446" y="408" font-size="12.5" fill="#9a7c33">從 state 衍生、自動快取</text>

  <!-- Component box -->
  <rect x="44" y="212" width="212" height="112" rx="14" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="150" y="248" font-size="18" font-weight="700" fill="#475569" text-anchor="middle">元件 Component</text>
  <text x="150" y="273" font-size="12.5" fill="#64748b" text-anchor="middle">讀取 state / getters</text>
  <text x="150" y="293" font-size="12.5" fill="#64748b" text-anchor="middle">呼叫 actions</text>
  <text x="150" y="313" font-size="12" fill="#94a3b8" text-anchor="middle">storeToRefs 保持響應性</text>

  <!-- Arrow 1: Component -> Actions -->
  <path d="M 256 236 C 320 175, 356 155, 420 151" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="330" cy="171" r="12" fill="#42b883"/>
  <text x="330" y="176" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
  <text x="348" y="150" font-size="12.5" font-weight="600" fill="#334155">呼叫 action</text>

  <!-- Arrow 2: Actions -> State -->
  <path d="M 618 196 L 618 218" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="640" cy="208" r="12" fill="#6366f1"/>
  <text x="640" y="213" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
  <text x="658" y="212" font-size="12.5" font-weight="600" fill="#334155">修改 state</text>

  <!-- Arrow 3: State -> Getters -->
  <path d="M 618 310 L 618 332" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="640" cy="322" r="12" fill="#eab308"/>
  <text x="640" y="327" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  <text x="658" y="326" font-size="12.5" font-weight="600" fill="#334155">自動衍生 (computed)</text>

  <!-- Arrow 4: State/Getters -> Component (view update) -->
  <path d="M 422 379 C 320 379, 300 330, 256 306" fill="none" stroke="#2f855a" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowGreen)"/>
  <circle cx="322" cy="360" r="12" fill="#2f855a"/>
  <text x="322" y="365" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
  <text x="300" y="392" font-size="12.5" font-weight="600" fill="#2f855a" text-anchor="middle">響應式更新畫面</text>

  <!-- footnote -->
  <text x="44" y="352" font-size="11.5" fill="#94a3b8">＊虛線＝資料變動後畫面自動反映，不需手動操作</text>
</svg>
